{% extends 'base.html' %}
{% block title %}Новый аккаунт{% endblock %}
{% block content %}
    <main id="auth">
        
        <h1>Создать аккаунт</h1>
        
        <form action="http://192.168.1.212/create_account" method="post">
            <p>Логин:</p>
            <input type="text" name="login">

            <p>Пароль:</p>
            <input type="text" name="password">

            <br>
            <button type="submit">Создать аккаунт</button>
            <br>
            <button type="button" onclick="window.location.href = 'http://192.168.1.212/auth'">Назад</button>
        </form>
        <p style="color: red">{{ error }}</p>
    </main>
{% endblock %}
