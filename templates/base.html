<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base-style.css') }}">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body class="body-section">
    <div class="burger-menu" style="display: none;">
        <div class="left-burger-menu">
            <button class="button-link shaped" onclick="open_local_chats()"><img src="{{ url_for('static', filename='chat.png') }}" width="40px" height="40px"></button>
        </div>
        <div class="right-burger-menu" style="display: none;">
            <!-- ТУТ ИЗМЕНИТЬ: в index.py добавить обработку и ответ и зарегать тут -->

            <input type="text" placeholder="Найти пользователя" id="person_login">
            <button onclick="find_person()"><img src="{{ url_for('static', filename='find.png') }}" width="40px" height="40px"></button>

            <div id="found-users" style="display: none;" class="input-chats">
                <h1>Поиск</h1>
                <div id="found-users-2"></div>
            </div>

            <div class="input-chats" id="input-chats">
                <h1>Друзья</h1>
                <div id="input-chats-2"></div>
            </div>
        </div>
    </div>
    <section class="base-section">
        <header class="space-between">
            <div>
                <button class="button-link" onclick="show_burger_menu()"><img src="{{ url_for('static', filename='burger_menu.png') }}" width="40px" height="40px"></button>
                <button class="button-link" onclick="window.location.href = '{{ conn_type }}://{{ main_ip }}/profile?user={{ login }}';">
                    <div class="profile-header">
                        <img src="{{ url_for('static', filename='account.png') }}" width="40px" height="40px">
                        <p>{{ login }}</p>
                    <div>
                </button>
            </div>
            <form action="{{ conn_type }}://{{ main_ip }}/index" method="post">
                    <input type="hidden" name="clear_session" value="1">
                    <button type="submit">Выйти</button>
            </form>
            {% if login == 'admin' %}
                <form action="{{ conn_type }}://{{ main_ip }}/index" method="post">
                    <input type="hidden" name="admin" value="1">
                    <button type="submit">Админ панель</button>
                </form>
            {% endif %}
        </header>
        {% block content %}{% endblock %}
    </section>

    <script>
        let is_burger_menu_showed = false;
        function show_burger_menu() {
            const burger_menu = document.querySelector(".burger-menu");
            
            if (!is_burger_menu_showed) {
                burger_menu.style.display = "flex";
                is_burger_menu_showed = true;

                fetch("{{ conn_type }}://{{ main_ip }}/index", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: URLSearchParams({
                        get_user_chats: "1"
                    })
                })
                .then(response => response.json())
                .then(data => {
                    // ТУТ ИЗМЕНИТЬ: Добавлять на страницу друзей и каналы
                    // data.channels => ['ch_name1', 'ch_name2']
                    // data.friends => ['fr_name1', 'fr_name2']
                    data.channels.forEach(channel => {
                        const button_channel = document.createElement("button");
                        button_channel.textContent = channel[0].toUpperCase();
                        button_channel.classList.add("button-link", "shaped", "channel-icon");
                        burger_menu.appendChild(button_channel);
                    });
                });

            } else {
                burger_menu.style.display = "none";
                is_burger_menu_showed = false;
            }
        }

        function open_local_chats() {
            const right_menu = document.querySelector(".right-burger-menu");
            right_menu.style.display = "flex";
            right_menu.style.flexDirection = "column";

            const left_burger_menu = document.querySelector(".left-burger-menu");
            left_burger_menu.style.borderRight = "1px solid grey";
            left_burger_menu.style.marginRight = "5px";

            const input_chats = document.getElementById("input-chats-2");
            input_chats.innerHTML = "";

            fetch("{{ conn_type }}://{{ main_ip }}/index", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        get_user_chats: "1"
                    })
                })
                .then(response => response.json())
                .then(data => {
                    data.friends.forEach(username => {
                        const user_chat_button = document.createElement("button");
                        user_chat_button.innerHTML = `
                            <img src="{{ url_for('static', filename='account.png') }}" width='40px' height='40px'>
                            <p>${username}</p>
                        `;
                        user_chat_button.classList.add("button-link", "row-form", "show-bg");
                        input_chats.appendChild(user_chat_button);
                        // ТУТ ИЗМЕНИТЬ: добавить обработку при нажатии на чат с пользователем;
                    });
                });
        }
        
        function find_person() {
            const user_to_find = document.getElementById("person_login").value;

            const main_container = document.getElementById("found-users");
            main_container.style.display = "block";

            const container = document.getElementById("found-users-2");
            container.innerHTML = "";

            fetch("{{ conn_type }}://{{ main_ip }}/index", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: new URLSearchParams({
                    find_user: "1",
                    login: user_to_find
                })
            })
            .then(response => response.json())
            .then(data => {
                // data.username
                if (data.exists) {
                    const user_chat_button = document.createElement("button");
                    user_chat_button.innerHTML = `
                        <img src="{{ url_for('static', filename='account.png') }}" width='40px' height='40px'>
                        <p>${user_to_find}</p>
                    `;
                    user_chat_button.classList.add("button-link", "row-form", "show-bg");
                    user_chat_button.onclick = function() {
                        window.location.href = `{{ conn_type }}://{{ main_ip }}/profile?user=${user_to_find}`;
                    };

                    container.appendChild(user_chat_button);
                    // ТУТ ИЗМЕНИТЬ: добавить обработку открытия чата
                } else {
                    const error = document.createElement("p");
                    error.textContent = "Пользователь не найден";
                    error.style.color = "red";
                    container.appendChild(error);
                }
            });
        }
    </script>
</body>
</html>
