<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
</head>
<body>
    <main id="auth">
        
        <h1>Создать аккаунт</h1>
        
        <form action="{{ conn_type }}://{{ main_ip }}/create_account" method="post">
            <p>Логин:</p>
            <input type="text" name="login">

            <p>Пароль:</p>
            <input type="text" name="password">

            <br>
            <button type="submit">Создать аккаунт</button>
            <br>
            <button type="button" onclick="window.location.href = '{{ conn_type }}://{{ main_ip }}/auth'">Назад</button>
        </form>
        <p style="color: red">{{ error }}</p>
    </main>
</body>
</html>
