<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
</head>
<body>
    <main id="auth">
        <h1>Вход</h1>
        <form action="{{ conn_type }}://{{ main_ip }}/auth" method="post">
            <input type="hidden" name="log_into" value="1">

            <p>Логин:</p>
            <input type="text" name="login">

            <p>Пароль:</p>
            <input type="text" name="password">

            <br>
            <button type="submit">Войти</button>
            <br>
        </form>
        <form action="{{ conn_type }}://{{ main_ip }}/auth" method="post">
            <input type="hidden" name="create_account" value="1">
            <button type="submit">Создать новый аккаунт</button>
        </form>
        <p style="color: red">{{ error }}</p>
    </main>
</body>
</html>
